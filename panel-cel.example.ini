; Copy this file to panel-cel.ini next to main.exe, then adjust the paths.
; panel-cel.ini is intentionally ignored by Git because it contains local paths.

[scrcpy]
d3d11_dir=C:\path\to\scrcpy-d3d11
d3d11_exe=C:\path\to\scrcpy-d3d11\main.exe

gpu_dir=C:\path\to\scrcpy-gpu\native
gpu_main_exe=C:\path\to\scrcpy-gpu\native\main.exe
gpu_nvdec_exe=C:\path\to\scrcpy-gpu\native\main_gpu.exe

[volume]
volume_dir=C:\path\to\phone-volume
volume_exe=C:\path\to\phone-volume\main.exe
